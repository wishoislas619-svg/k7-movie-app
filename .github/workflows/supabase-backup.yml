name: Supabase Daily Backup

on:
  schedule:
    # Se ejecuta todos los días a las 3:00 AM (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite ejecutar el respaldo manualmente desde el botón "Run workflow"

jobs:
  backup-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      
      - name: Obtener fecha actual
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Descargar respaldo (SQL Dump)
        run: |
          # Extrae solo la estructura, datos y roles en formato puro SQL
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" -C --clean --if-exists > backup_k7_${{ env.DATE }}.sql
          
          # Comprimir el archivo para que no sea muy pesado en el correo
          zip backup_k7_${{ env.DATE }}.zip backup_k7_${{ env.DATE }}.sql

      - name: Enviar correo con el respaldo
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 🗄️ Respaldo Diario K7 Movie - ${{ env.DATE }}
          to: wishoislas619@gmail.com,blueyes55523@gmail.com
          from: Backup Bot K7
          body: |
            Hola Luis,
            
            Adjunto se encuentra el respaldo diario de toda tu base de datos de producción (Estructura y Datos).
            Este archivo .sql comprimido te sirve para:
            - Restaurar datos si sufres un ataque.
            - Migrar tu proyecto a otro proveedor si hay problemas con Supabase.
            
            Fecha de creación: ${{ env.DATE }}
          attachments: backup_k7_${{ env.DATE }}.zip
